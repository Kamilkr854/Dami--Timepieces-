<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dami & Co. | Luxury Timepieces</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-top">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>DAMI & CO.</h1>
            <div class="cart-icon" onclick="openCart()">🛒 <span id="cartCount">0</span></div>
        </div>

        <div id="sideMenu" class="side-menu">
            <span class="close-btn" onclick="toggleMenu()">&times;</span>
            <a href="#" onclick="showSection('storefront')">Home</a>
            <a href="#" onclick="adminLogin()">Admin Portal</a>
            
            <a href="#" onclick="openCart()">View Cart</a>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search watches...">
            <button onclick="searchWatches()">Search</button>
        </div>
    </header>

    <section id="admin-panel" class="hidden">
        <div class="admin-container">
            <h2>Inventory Management</h2>
            <div class="admin-form">
                <input type="text" id="watchName" placeholder="Watch Name">
                <input type="number" id="watchPrice" placeholder="Price (Naira)">
                <input type="text" id="watchImage" placeholder="Image Link">
                <select id="watchCategory">
                    <option value="All">All Categories</option>
                    <option value="G-Shock">G-Shock</option>
                    <option value="Luxury">Luxury</option>
                    <option value="Sport">Sport</option>
                </select>
                <button onclick="saveProduct()" class="save-btn">Submit to Cloud</button>
                <button class="back-btn" onclick="showSection('storefront')">Close Admin</button>
            </div>
        </div>
    </section>

    <section id="storefront">
        <div id="watchGrid" class="grid"></div>
    </section>

    <div id="cartModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCart()">&times;</span>
            <h2>Your Cart</h2>
            <div id="cartItems"></div>
            <hr>
            <p>Total: <span id="cartTotal">₦0</span></p>
            <button onclick="checkout()" class="whatsapp-btn">Order on WhatsApp</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
