 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dami & Co. | Luxury Timepieces</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>DAMI & CO.</h1>
        <p class="tagline">CURATED WATCHES</p>
        <button class="admin-btn" onclick="toggleAdmin()">Admin Portal</button>
    </header>

    <section id="admin-panel" class="hidden">
        <h2>Inventory Management</h2>
        <div class="admin-form">
            <input type="text" id="watchName" placeholder="Watch Name (e.g. G-Shock GA-2100)">
            <input type="number" id="watchPrice" placeholder="Price (Naira)">
            <input type="text" id="watchImage" placeholder="Direct Image Link (from ImgBB)">
            <select id="watchCategory">
                <option value="G-Shock">G-Shock</option>
                <option value="Luxury">Luxury</option>
                <option value="Sport">Sport</option>
            </select>
            <button onclick="saveProduct()">Submit to Cloud</button>
            <button class="back-btn" onclick="toggleAdmin()">Back to Store</button>
        </div>
    </section>

    <section id="storefront">
        <div id="watchGrid" class="grid">
            </div>
        
        <div class="checkout-bar">
            <button onclick="checkout()" class="whatsapp-btn">
                Checkout via WhatsApp
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
